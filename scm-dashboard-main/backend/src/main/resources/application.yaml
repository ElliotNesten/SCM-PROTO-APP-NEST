security:
  authentication:
    jwt:
      secret: ${JWT_SECRET}
      expiration-ms: ${JWT_EXPIRATION}

spring:
  application:
    name: backend

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        "[format_sql]": true
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true

server:
  host: ${SERVER_HOST}
  port: ${SERVER_PORT:8080}

app:
  supabase:
    url: ${SUPABASE_URL}
    publishable-key: ${SUPABASE_PUBLISHABLE_KEY}
    secret-key: ${SUPABASE_SECRET_KEY}

  storage:
    s3:
      endpoint: ${STORAGE_S3_ENDPOINT}
      access-key: ${STORAGE_S3_ACCESS_KEY}
      secret-key: ${STORAGE_S3_SECRET_KEY}
      region: ${STORAGE_S3_REGION}
    buckets:
      avatars: ${STORAGE_BUCKET_AVATARS}
      gig-documents: ${STORAGE_BUCKET_GIG_DOCUMENTS}